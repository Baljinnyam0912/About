<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    
    <meta
      name="description"
      content="Web site created using create-react-app"
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <title>Portfolia</title>
  </head>
  <body>
    <script type="text/javascript">
new FinisherHeader({
  "count": 14,
  "size": {
    "min": 300,
    "max": 1500,
    "pulse": 0
  },
  "speed": {
    "x": {
      "min": 0.1,
      "max": 0.6
    },
    "y": {
      "min": 0.1,
      "max": 0.6
    }
  },
  "colors": {
    "background": "#9138e5",
    "particles": [
      "#ff4848",
      "#000000",
      "#2235e5",
      "#000000",
      "#ff0000"
    ]
  },
  "blending": "overlay",
  "opacity": {
    "center": 0.5,
    "edge": 0.05
  },
  "skew": 1.9,
  "shapes": [
    "c",
    "s",
    "t"
  ]
});
</script>
    <div id="root"></div>
  </body>
</html>
